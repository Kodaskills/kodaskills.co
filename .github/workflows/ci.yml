name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - ".dockerignore"
      - ".env*"
      - "biome.json"
      - "knip.config.ts"
      - "commitlint.config.ts"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "*.dockerfile"
      - "Justfile"
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "*.md"
  #     - ".gitignore"
  #     - ".dockerignore"
  #     - ".env*"
  #     - "biome.json"
  #     - "knip.config.ts"
  #     - "commitlint.config.ts"
  #     - "Dockerfile"
  #     - "docker-compose*.yml"
  #     - "*.dockerfile"
  #     - "Justfile"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bun biome check .

      - name: Knip
        run: bun knip

  typecheck:
    name: 🧪 Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun astro check

  i18n:
    name: 🌍 i18n
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lingui compile (strict)
        run: bun lingui compile --strict

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache .astro
        uses: actions/cache@v5
        with:
          path: .astro
          key: ${{ runner.os }}-astro-${{ hashFiles('astro.config.ts', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload astro-cache artifact
        uses: actions/upload-artifact@v7
        with:
          name: astro-cache
          path: .astro/
          retention-days: 7

  deploy:
    name: 🚀 Deploy
    needs: [lint, typecheck, i18n, build]
    if: github.event_name == 'pull_request' && success()
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      branch: ${{ github.head_ref }}
      commit_sha: ${{ github.event.pull_request.head.sha }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_url: ${{ github.event.pull_request.html_url }}
    secrets: inherit
