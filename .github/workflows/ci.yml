name: Continuous Integration

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "uno.config.ts"
      - "astro.config.*"
      - "package.json"
      - "tsconfig.json"
    paths-ignore:
      - "src/components/astrobook/**"
      - "**.stories.*"
    
  # push:
  #   branches: [main]
  #   paths:
  #     - "src/**"
  #     - "public/**"
  #     - "uno.config.ts"
  #     - "astro.config.*"
  #     - "package.json"
  #     - "tsconfig.json"
  # paths-ignore:
  #     - "src/components/astrobook/**"
  #     - "**.stories.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: ${{ vars.BUN_VERSION }}

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: 🔍 Linting and Formatting
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup
        uses: ./.github/actions/setup-bun

      - name: 🔍 Biome lint
        run: bun biome check .

  unused-deps:
    name: ✂️ Dependencies Unused
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup
        uses: ./.github/actions/setup-bun

      - name: ✂️ Knip
        run: bun knip

  astro-check:
    name: 🧪 Astro Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup
        uses: ./.github/actions/setup-bun

      - name: 🧪 TypeScript check
        run: bun astro check

  i18n:
    name: 🌍 Verify Translations
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup
        uses: ./.github/actions/setup-bun

      - name: 🌍 Lingui compile (strict)
        run: bun lingui compile --strict

  build:
    name: 🏗️ Build Astro
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup
        uses: ./.github/actions/setup-bun

      - name: 🔨 Build
        run: bun run build

      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1
