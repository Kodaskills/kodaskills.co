name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string
      branch:
        description: 'Branch to deploy'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to deploy'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: false
        type: string
        default: '0'
      pr_url:
        description: 'Pull request URL'
        required: false
        type: string
        default: ''
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: "deploy-${{ inputs.environment || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment) || 'preview' }}"
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-cloudflare:
    name: ☁️ Deploy to Cloudflare Pages
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || (github.event.workflow_run.event == 'push' && 'production' || github.event.inputs.environment == 'production' && 'production' || 'preview') }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      DEPLOY_TYPE: ${{ inputs.environment || (github.event.workflow_run.event == 'push' && 'production' || github.event.inputs.environment == 'production' && 'production' || 'preview') }}
      DEPLOY_BRANCH: ${{ inputs.branch || (github.event.workflow_run.event == 'push' && 'main' || github.event.workflow_run.head_branch) }}
      DEPLOY_COMMIT: ${{ inputs.commit_sha || github.event.workflow_run.head_sha }}
      NOTIFY_TITLE: ${{ inputs.pr_url && github.event.workflow_run.display_title || github.event.workflow_run.display_title || '' }}
      NOTIFY_PR_NUMBER: ${{ inputs.pr_number || 0 }}
      NOTIFY_AUTHOR: ${{ github.event.workflow_run.triggering_actor.login || github.actor }}
      NOTIFY_PR_URL: ${{ inputs.pr_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Download astro-cache artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-cache
          path: .astro/
        continue-on-error: true

      - name: 🚀 Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=${{ env.DEPLOY_BRANCH }}${{ env.DEPLOY_TYPE == 'preview' && format(' --commit-hash={0}', env.DEPLOY_COMMIT) || '' }}

      - name: Post deployment comment
        if: ${{ inputs.pr_number != '0' || github.event.workflow_run.event == 'pull_request' }}
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const prNumber = ${{ inputs.pr_number || 0 }};
            if (prNumber && prNumber > 0 && url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🚀 Preview deployed: ${url}`
              });
            }

      - name: 💬 Slack notification
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          job_status: ${{ job.status }}
          deploy_type: ${{ env.DEPLOY_TYPE }}
          pr_title: ${{ env.NOTIFY_TITLE }}
          pr_number: ${{ env.NOTIFY_PR_NUMBER }}
          pr_author: ${{ env.NOTIFY_AUTHOR }}
          preview_url: ${{ steps.deploy.outputs.deployment-url }}
          pr_url: ${{ env.NOTIFY_PR_URL }}
          commit_hash: ${{ env.DEPLOY_COMMIT }}
