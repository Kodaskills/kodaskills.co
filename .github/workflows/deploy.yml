name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: "deploy-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'preview' }}"
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy-cloudflare:
    name: ☁️ Deploy to Cloudflare Pages
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.workflow_run.event == 'push' && 'production' || github.event.inputs.environment == 'production' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      DEPLOY_TYPE: ${{ github.event.workflow_run.event == 'push' && 'production' || github.event.inputs.environment == 'production' && 'production' || 'preview' }}
      DEPLOY_BRANCH: ${{ github.event.workflow_run.event == 'push' && 'main' || github.event.workflow_run.head_branch }}
      DEPLOY_COMMIT: ${{ github.event.workflow_run.head_sha }}
      NOTIFY_TITLE: ${{ github.event.workflow_run.name }}
      NOTIFY_PR_NUMBER: 0
      NOTIFY_AUTHOR: ${{ github.actor }}
      NOTIFY_PR_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/

      - name: Download astro-cache artifact
        uses: actions/download-artifact@v7
        with:
          name: astro-cache
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .astro/
        continue-on-error: true

      - name: 🚀 Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=${{ env.DEPLOY_BRANCH }}${{ env.DEPLOY_TYPE == 'preview' && format(' --commit-hash={0}', env.DEPLOY_COMMIT) || '' }}

      - name: Post deployment comment
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const branch = '${{ github.event.workflow_run.head_branch }}';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: context.repo.owner + ':' + branch,
              state: 'open'
            });
            if (prs.length > 0 && url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body: `🚀 Preview deployed: ${url}`
              });
            }

      - name: 💬 Slack notification
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          job_status: ${{ job.status }}
          deploy_type: ${{ env.DEPLOY_TYPE }}
          pr_title: ${{ env.NOTIFY_TITLE }}
          pr_number: ${{ env.NOTIFY_PR_NUMBER }}
          pr_author: ${{ env.NOTIFY_AUTHOR }}
          preview_url: ${{ steps.deploy.outputs.deployment-url }}
          pr_url: ${{ env.NOTIFY_PR_URL }}
          commit_hash: ${{ env.DEPLOY_COMMIT }}
