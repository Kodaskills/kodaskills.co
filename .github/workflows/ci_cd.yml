name: 🚀 CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 🧪 Set ACT flag
        run: echo "ACT=$(echo $ACT | false)" >> $GITHUB_ENV

      - name: 📋 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Setup Just command runner
        uses: extractions/setup-just@v2

      - name: ⚙️ Setup Node.js with Volta
        uses: volta-cli/action@v4

      - name: 📦 Clear npm cache
        run: npm cache clean --force

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run Lefthook pre-commit & pre-push
        run: |
          npx --yes lefthook run pre-commit --all-files
          npx --yes lefthook run pre-push  --all-files
        env:
          LEFTHOOK_EXCLUDE: no-ci

      - name: 🏗️ Build Astro site
        run: npm run build

      - name: 🚀 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist/
          retention-days: 1

  deploy-cloudflare:
    name: ☁️ Deploy to Cloudflare Pages
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./dist/

      - name: ☁️ Deploy to Cloudflare Pages
        id: deploy
        if: env.ACT != 'true'
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          command: >-
            pages deploy ./dist
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
            ${{ github.event_name == 'push' && '--branch=main' || format('--branch={0} --commit-hash={1}', github.head_ref, github.event.pull_request.head.sha) }}

      - name: 💬 Slack notification
        if: env.ACT != 'true' && always()
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          job_status: ${{ job.status }}
          deploy_type: ${{ github.event_name == 'push' && 'production' || 'preview' }}
          pr_title: ${{ github.event.pull_request.title || format('Push to {0}', github.ref_name) }}
          pr_number: ${{ github.event.pull_request.number || 0 }}
          pr_author: ${{ github.event.pull_request.user.login || github.actor }}
          preview_url: ${{ steps.deploy.outputs.deployment-url }}
          pr_url: ${{ github.event.pull_request.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          commit_hash: ${{ github.sha }}

  audit:
    name: 📊 Performance Audit
    if: ${{ github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Chrome locally (aka act)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        if: env.ACT == 'true'
        with:
          install-dependencies: true

      - name: ⚙️ Set local or CI env vars
        run: |
          if [ "${{ env.ACT }}" == 'true' ]; then
            echo "CHROME_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
            echo "UPLOAD_ARTIFACT=false" >> $GITHUB_ENV
          else
            echo "UPLOAD_ARTIFACT=true" >> $GITHUB_ENV
          fi
        shell: bash

      - name: 🚨 Run Lighthouse Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ".github/.lighthouserc.yml"
          uploadArtifacts: ${{ env.UPLOAD_ARTIFACT }}
          temporaryPublicStorage: ${{ env.UPLOAD_ARTIFACT }}

      - name: 🏅 Generate Lighthouse badge
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          npx --yes lighthouse-badges --url https://kodaskills.co/ --output ./.lighthouse-badges -s

      - name: 📤 Upload Lighthouse badge artifact
        id: lighthouse-cache-badge
        uses: actions/cache@v4
        with:
          path: ./.lighthouse-badges/lighthouse.svg
          key: badge-lightouse.svg
