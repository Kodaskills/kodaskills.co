name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read
  id-token: write

jobs:
  deploy-cloudflare:
    name: ☁️ Deploy to Cloudflare Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.workflow_run.event == 'push' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch }}
      DEPLOY_COMMIT: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: 🔍 Fetch PR data
        id: fetch-pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          PR=$(gh api repos/${{ github.repository }}/pulls --jq '.[] | select(.head.sha == "${{ github.event.workflow_run.head_sha }}")')
          echo "pr_number=$(echo "$PR" | jq -r '.number')" >> $GITHUB_OUTPUT
          echo "pr_title=$(echo "$PR" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "pr_url=$(echo "$PR" | jq -r '.html_url')" >> $GITHUB_OUTPUT
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup
        uses: ./.github/actions/setup-bun

      - name: 📥 Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/

      - name: 🚀 Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=${{ env.DEPLOY_BRANCH }} --commit-hash=${{ env.DEPLOY_COMMIT }}

      - name: 💬 Slack notification
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          job_status: ${{ job.status }}
          pr_title: ${{ steps.fetch-pr.outputs.pr_title }}
          pr_number: ${{ steps.fetch-pr.outputs.pr_number }}
          deploy_url: ${{ steps.deploy.outputs.deployment-url }}
          pr_url: ${{ steps.fetch-pr.outputs.pr_url }}
          commit_hash: ${{ env.DEPLOY_COMMIT }}
