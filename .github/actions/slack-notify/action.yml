name: 'Slack Notification'
description: 'Send deployment notification to Slack'

inputs:
  webhook_url:
    description: 'Slack webhook URL'
    required: true
  job_status:
    description: 'Job status (success/failure)'
    required: true
  pr_title:
    description: 'Pull request title'
    required: true
  pr_number:
    description: 'Pull request number'
    required: true
  pr_author:
    description: 'Pull request author'
    required: true
  deploy_url:
    description: 'Deployment URL'
    required: true
  pr_url:
    description: 'Pull request URL'
    required: true
  commit_hash:
    description: 'Commit hash'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set environment variables
      shell: bash
      run: |
        if [ "${{ inputs.job_status }}" == "success" ]; then
          echo "STATUS_EMOJI=🟢" >> $GITHUB_ENV
          echo "COLOR=#2EB67D" >> $GITHUB_ENV
        elif [ "${{ inputs.job_status }}" == "failure" ]; then
          echo "STATUS_EMOJI=🔴" >> $GITHUB_ENV
          echo "COLOR=#E01E5A" >> $GITHUB_ENV
        else
          echo "STATUS_EMOJI=🟡" >> $GITHUB_ENV
          echo "COLOR=#ECB22E" >> $GITHUB_ENV
        fi
        echo "PR_NAME=${{ inputs.pr_title }}" >> $GITHUB_ENV
        echo "PR_NUMBER=${{ inputs.pr_number }}" >> $GITHUB_ENV
        echo "PR_AUTHOR=${{ inputs.pr_author }}" >> $GITHUB_ENV
        echo "COMMIT_HASH=${{ inputs.commit_hash }}" >> $GITHUB_ENV
        echo "TIME=$(date '+%H:%M:%S')" >> $GITHUB_ENV
        echo "DEPLOY_URL=${{ inputs.deploy_url }}" >> $GITHUB_ENV
        echo "PR_URL=${{ inputs.pr_url }}" >> $GITHUB_ENV
        echo "LOGS_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
        echo "TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

    - name: Send Slack notification
      uses: slackapi/slack-github-action@v3
      with:
        webhook: ${{ inputs.webhook_url }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": "${{ env.STATUS_EMOJI }} Deploy ${{ inputs.job_status }}",
            "attachments": [
              {
                "color": "${{ env.COLOR }}",
                "blocks": [
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Status*\n${{ env.STATUS_EMOJI }} ${{ inputs.job_status }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Commit*\n`${{ env.COMMIT_HASH }}`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*PR*\n<${{ env.PR_URL }}|#${{ env.PR_NUMBER }} — ${{ env.PR_NAME }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Logs*\n<${{ env.LOGS_URL }}|View workflow logs>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*URL*\n<${{ env.DEPLOY_URL }}|${{ env.DEPLOY_URL }}>"
                      }
                    ]
                  },
                  {
                    "type": "context",
                    "elements": [
                      {
                        "type": "mrkdwn",
                        "text": "kodaskills.co • ${{ env.TIME }} • via GitHub Actions"
                      }
                    ]
                  }
                ]
              }
            ]
          }
